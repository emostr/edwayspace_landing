<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему - edway.space</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="page--login">

    <header class="header">
        <div class="container header__inner">
            <a href="../" class="logo">edway<span class="logo__dot">.</span>space</a>
            <nav class="nav">
                <a href="about.html" class="nav__link">О платформе</a>
            </nav>
        </div>
    </header>

    <main class="login-main">
        <div class="login-card">
            <h1 class="login-card__heading">Добро пожаловать</h1>
            <form class="login-form" id="login-form" action="#" method="post" novalidate>
                <input class="input" type="text" id="login-email" name="login" placeholder="Логин" autocomplete="username" required>
                <input class="input" type="password" id="login-password" name="password" placeholder="Пароль"
                    autocomplete="current-password" required>
                <div class="login-hint">
                    <svg class="login-hint__icon" width="16" height="16" viewBox="0 0 16 16" fill="none"
                        aria-hidden="true">
                        <circle cx="8" cy="8" r="7.5" stroke="currentColor" stroke-width="1.2" />
                        <text x="8" y="12" text-anchor="middle" fill="currentColor" font-size="10"
                            font-family="'Racama', system-ui, sans-serif" font-weight="600">?</text>
                    </svg>
                    <p class="login-hint__text">Первичный доступ предоставляется по постоянному логину и временному
                        паролю, выданному администратором</p>
                </div>
                <p class="form-error" id="login-error"></p>
                <button class="btn btn--full" type="submit">Войти</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer__inner">
            <span class="footer__copy">© 2026 edway.space by emostrStudio</span>
            <nav class="footer__nav">
                <a href="about.html" class="footer__link">О платформе</a>
                <a href="support.html" class="footer__link">Поддержка</a>
            </nav>
        </div>
    </footer>

    <script src="../js/login.js"></script>
</body>

</html>
